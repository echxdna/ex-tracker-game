<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EX MAS-turtle</title>

<meta name="description" content="EXの出現回数を数えるかめね">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@100;300;400;500;700;800;900&display=swap" rel="stylesheet">

<style>
body{
font-family:'M PLUS Rounded 1c', sans-serif;
text-align:center;
margin-top:40px;
margin-left:0;
margin-right:0;
}

#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 180px;  /* 常に固定幅 */
  height: 100%;
  background: #e0f7fa;
  overflow-x: hidden;
  z-index: 1000;
  box-shadow: 2px 0 8px #0001;
  padding-top: 60px;
  transform: translateX(-180px);  /* 閉じた状態で左に隠す */
  transition: transform 0.3s;  /* スライドアニメーション */
}

#sidebar.open {
  transform: translateX(0);  /* 開いた状態で元の位置 */
}

#sidebar .closebtn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 28px;
  cursor: pointer;
  background: none;
  border: none;
}

#sidebar .stageBtn {
  display: block;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  padding: 16px 24px;
  font-size: 16px;
  cursor: pointer;
  color: #00796b;
  outline: none;
}

#sidebar .stageBtn.active {
  background: #b2dfdb;
  font-weight: bold;
}

#toggleSidebarBtn {
  position: fixed;
  left: 10px;
  top: 10px;
  width: 40px;
  height: 40px;
  background: #ffffff;
  border: none;
  border-radius: 6px;
  z-index: 1100;
  cursor: pointer;
  padding: 8px;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
#toggleSidebarBtn:hover {
  background: #e0f7fa;
}

.hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.hamburger-line {
  width: 20px;
  height: 2px;
  background-color: #009688;
  transition: all 0.3s ease;
}

.hamburger-line.top {
  transform-origin: center;
}

.hamburger-line.middle {
  transform-origin: center;
}

.hamburger-line.bottom {
  transform-origin: center;
}

#toggleSidebarBtn.active .hamburger-line.top {
  transform: translateY(7px) rotate(45deg);
}

#toggleSidebarBtn.active .hamburger-line.middle {
  opacity: 0;
}

#toggleSidebarBtn.active .hamburger-line.bottom {
  transform: translateY(-7px) rotate(-45deg);
}

.sidebarGroup {
  margin-bottom: 18px;
  border-left: 0px solid #e0f7fa;
}
.sidebarGroupTitle {
  font-size: 15px;
  color: #009688;
  margin-bottom: 4px;
  margin-top: 8px;
  font-weight: 700;
  font-style: bold;
}

.sidebarGroupContent {
  max-height: 500px; /* 展開時の最大高さ（十分大きく） */
  transition: max-height 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
  overflow: hidden;
  opacity: 1;
}
.sidebarGroupContent.collapsed {
  max-height: 0;
  opacity: 0;
  pointer-events: none;
  margin-top: 20px;
}

.mainContent {
  margin-left: 0;
  transition: none;
}

.buttonGroup {
  display:auto;
  flex-direction:column;
  align-items:center;
  margin-bottom:16px;
}

.mainButton{
display:auto;
flex-direction:column;
align-items:center;
font-size:40px;
font-weight:700;
font-style:normal;
padding:15px 25px;
margin:8px;
margin-bottom:8px;
}

.subButton{
font-size:15px;
font-style:italic;
padding:8px 13px;
margin:8px;
}

.label{
font-size:26px;
text-align:left;
}

.stats{
border-collapse: collapse;
margin-left: auto;
margin-right: auto;
}

.stats td{
padding:6px 12px;
}

.stat{
font-size:30px;
font-weight:bold;
text-align:right;
}

.stat{
font-variant-numeric: tabular-nums;
}

.percent::after{
content:"%";
margin-left:2px;
font-size:0.8em;
}

.panel{
margin-top:10px;
}

#editPanel{
display:none;
width:90%;
max-width:400px;
margin:auto;
}

.editGrid{
display:grid;
grid-template-columns: 1fr 1fr;
gap:15px;
}

input{
width:80px;
}

@keyframes flash {
0% { background-color: white; }
50% { background-color: #249646; }
100% { background-color: white; }
}

@keyframes flashRed {
0% { background-color: white; }
50% { background-color: #E60011; }
100% { background-color: white; }
}
.flash{
animation: flash 0.25s;
}
.flashRed{
animation: flashRed 0.25s;
}
</style>
</head>

<body>

<button id="toggleSidebarBtn" onclick="toggleSidebar()">
  <span class="hamburger">
    <span class="hamburger-line top"></span>
    <span class="hamburger-line middle"></span>
    <span class="hamburger-line bottom"></span>
  </span>
</button>
<div id="sidebar">
    <div class="sidebarGroup">
        <div class="sidebarGroupTitle">天魔の孤城</div>
        <button class="stageBtn" id="stageBtn0" onclick="selectStage(0)">アーキレット</button>
        <button class="stageBtn" id="stageBtn1" onclick="selectStage(1)">コルティーナ</button>
    </div>
    <div class="sidebarGroup">
        <div class="sidebarGroupTitle">破界の星墓</div>
        <button class="stageBtn" id="stageBtn2" onclick="selectStage(2)">アムネディア</button>
    </div>
    <div class="sidebarGroup">
        <div class="sidebarGroupTitle" onclick="toggleGroup(this)">禁忌の獄(展開▼)</div>
        <div class="sidebarGroupContent collapsed">
            <button class="stageBtn" id="stageBtn4" onclick="selectStage(4)">刹那</button>
            <button class="stageBtn" id="stageBtn5" onclick="selectStage(5)">那由多</button>
            <button class="stageBtn" id="stageBtn6" onclick="selectStage(6)">阿頼耶</button>
            <button class="stageBtn" id="stageBtn7" onclick="selectStage(7)">無量大数</button>
            <button class="stageBtn" id="stageBtn8" onclick="selectStage(8)">涅槃寂静</button>
            <button class="stageBtn" id="stageBtn9" onclick="selectStage(9)">不可思議</button>
        </div>
    </div>
    <div class="sidebarGroup">
        <div class="sidebarGroupTitle">その他</div>
        <button class="stageBtn" id="stageBtn3" onclick="selectStage(3)">自由枠</button>
        <button class="stageBtn" onclick="if(confirm('全てのデータをリセットするかめか？')){localStorage.removeItem('stageTrackerAll'); localStorage.removeItem('stageIndex'); location.reload();}">初期化</button>
    </div>
</div>

<div class="mainContent" id="mainContent">

<h2 id="stageTitle">&#x1f422;EX MAS-turtle&#x1f54a;</h2>

<div class="buttonGroup">
  <div class="mainButtons">
    <button class="mainButton" onclick="normal()">+1&#x1f422;</button>
    <button class="mainButton" onclick="extra()">EX&#x1f54a;</button>
  </div>
  <button class="subButton" onclick="openEdit()">EDit&#x270f;</button>
</div>

<div class="panel">

<table class="stats">

<tr>
<td class="label">現在周回&#x1f422;</td>
<td class="stat" id="current"></td>
</tr>

<tr>
<td class="label">総周回&#x1f422;</td>
<td class="stat" id="normalTotal"></td>
</tr>

<tr>
<td class="label">EX出現&#x1f54a;</td>
<td class="stat" id="extraTotal"></td>
</tr>

<tr>
<td class="label">ラック&#x1f340;</td>
<td class="stat" id="rewardTotal"></td>
</tr>

<tr>
<td class="label">最高ハマり&#x1f422;</td>
<td class="stat" id="max"></td>
</tr>

<tr>
<td class="label">EX出現率&#x1f54a;</td>
<td class="stat percent" id="rate"></td>
</tr>

</table>
</div>

<div id="editPanel">

<div class="editGrid">

<h3>&#x1f235; EDit &#x1f338;</h3>

<p>
現在周回<br>
<input id="editCurrent" type="number" min="0">
</p>

<p>
総周回<br>
<input id="editNormal" type="number" min="0">
</p>

<p>
EX出現<br>
<input id="editExtra" type="number" min="0">
</p>

<p>
ラック<br>
<input id="editReward" type="number" min="0">
</p>

<p>
最高ハマり<br>
<input id="editMax" type="number" min="0">
</p>

</div>

<button class="subButton" onclick="saveEdit()">Save&#x1f4dd;</button>
<button class="subButton" onclick="cancelEdit()">Cancel&#x274e;</button>

</div>
</div>

<script>
const STAGE_COUNT = 10;
const STAGE_NAMES = ["🔴アーキレット", "🟣コルティーナ", "🟢アムネディア", "その他", "🟡刹那", "🟣那由多", "🔵阿頼耶", "🔴無量大数", "🟢涅槃寂静", "🟡不可思議"];
let stageIndex = Number(localStorage.getItem("stageIndex")) || 0;

let allData = JSON.parse(localStorage.getItem("stageTrackerAll")) || [
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
  { normalClears:0, extraAppearances:0, extraRewards:0, currentStreak:0, maxStreak:0 },
];

while(allData.length < STAGE_COUNT){
  allData.push({
    normalClears:0,
    extraAppearances:0,
    extraRewards:0,
    currentStreak:0,
    maxStreak:0
  });
}

function saveAll(){
  localStorage.setItem("stageTrackerAll", JSON.stringify(allData));
  localStorage.setItem("stageIndex", stageIndex);
}

function getData(){
  return allData[stageIndex];
}

function setData(d){
  allData[stageIndex] = d;
  saveAll();
}

function flashScreen(color="flash"){
  document.body.classList.add(color)
  setTimeout(()=>{
    document.body.classList.remove(color)
  },250)
}

function save(){
  setData(getData());
  update();
}

function normal(){
  let data = getData();
  data.normalClears++;
  data.currentStreak++;
  save();
  flashScreen("flash");
}

function extra(){
  let data = getData();
  data.extraAppearances++;
  if(data.currentStreak > data.maxStreak){
    data.maxStreak = data.currentStreak;
  }
  let reward = prompt("ドロップ数を入力するかめね、負けたら「0」かめね");
  if(reward){
    data.extraRewards += Number(reward);
  }
  data.currentStreak = 0;
  save();
  flashScreen("flashRed");
}

function update(){
  let data = getData();
  document.getElementById("normalTotal").textContent = data.normalClears;
  document.getElementById("extraTotal").textContent = data.extraAppearances;
  document.getElementById("rewardTotal").textContent = data.extraRewards;
  document.getElementById("current").textContent = data.currentStreak;
  document.getElementById("max").textContent = data.maxStreak;
  let rate = 0;
  if(data.normalClears > 0){
    rate = (data.extraAppearances / data.normalClears * 100).toFixed(2);
  }
  document.getElementById("rate").textContent = rate;
  document.getElementById("stageTitle").innerHTML = `${STAGE_NAMES[stageIndex]}`;
  for(let i=0;i<STAGE_COUNT;i++){
    let btn = document.getElementById(`stageBtn${i}`);
    if(btn) btn.classList.toggle("active", i===stageIndex);
  }
}

function openEdit(){
  let data = getData();
  editPanel.style.display = "block";
  editNormal.value = data.normalClears;
  editExtra.value = data.extraAppearances;
  editReward.value = data.extraRewards;
  editCurrent.value = data.currentStreak;
  editMax.value = data.maxStreak;
}

function cancelEdit(){
  editPanel.style.display = "none";
}

function validate(d){
  if(d.extraAppearances > d.normalClears)
    return "EX出現が総周回を超えてるかめね";
  if(d.currentStreak > d.normalClears)
    return "現在周回が総周回を超えてるかめね";
  if(d.maxStreak < d.currentStreak)
    return "最高ハマりは現在周回以上かめね";
  if(d.extraRewards < 0)
    return "ラックは0以上かめね";
  return null;
}

function saveEdit(){
  let newData = {
    normalClears:Number(editNormal.value),
    extraAppearances:Number(editExtra.value),
    extraRewards:Number(editReward.value),
    currentStreak:Number(editCurrent.value),
    maxStreak:Number(editMax.value)
  }
  let error = validate(newData);
  if(error){
    alert(error);
    return;
  }
  setData(newData);
  editPanel.style.display = "none";
  update();
}

function toggleSidebar(){
  const sidebar = document.getElementById("sidebar");
  const btn = document.getElementById("toggleSidebarBtn");
  sidebar.classList.toggle("open");
  btn.classList.toggle("active");
}

function selectStage(idx){
  stageIndex = idx;
  saveAll();
  toggleSidebar();
  update();
}

function toggleGroup(titleElem) {
  const content = titleElem.nextElementSibling;
  content.classList.toggle('collapsed');
}

window.addEventListener("DOMContentLoaded", () => {
  update();
});
</script>

</body>
</html>
