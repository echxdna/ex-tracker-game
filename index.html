<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EX MAS-turtle</title>

<meta name="description" content="EXの出現回数を数えるかめね">
<meta property="og:type" content="website">


<style>

body{
font-family:sans-serif;
text-align:center;
margin-top:40px;
}

.mainButton{
font-size:30px;
padding:15px 25px;
margin:8px;
}

.subButton{
font-size:15px;
padding:8px 13px;
margin:8px;
}

.label{
font-size:24px;
text-align:left;
}

.stats{
border-collapse: collapse;
margin-left: auto;
margin-right: auto;
}

.stats td{
padding:6px 12px;
}

.stat{
font-size:28px;
font-weight:bold;
text-align:right;
}

.stat{
font-variant-numeric: tabular-nums;
}

.percent::after{
content:"%";
margin-left:2px;
font-size:0.8em;
}

.panel{
margin-top:10px;
}

#editPanel{
display:none;
width:90%;
max-width:400px;
margin:auto;
}

.editGrid{
display:grid;
grid-template-columns: 1fr 1fr;
gap:15px;
}

input{
width:80px;
}

@keyframes flash {
0% { background-color: white; }
50% { background-color: #b6ffb6; }
100% { background-color: white; }
}

.flash{
animation: flash 0.25s;
}

</style>
</head>

<body>

<h2>&#x1f422;EX MAS-turtle&#x1f54a;</h2>

<button class="mainButton" onclick="normal()">+1&#x1f422;</button>
<button class="mainButton" onclick="extra()">EX&#x1f54a;</button>
<button class="subButton" onclick="openEdit()">EDit&#x270f;</button>

<div class="panel">

<table class="stats">

<tr>
<td class="label">現在周回&#x1f422;:</td>
<td class="stat" id="current"></td>
</tr>

<tr>
<td class="label">総周回&#x1f422;:</td>
<td class="stat" id="normalTotal"></td>
</tr>

<tr>
<td class="label">総EX出現&#x1f54a;:</td>
<td class="stat" id="extraTotal"></td>
</tr>

<tr>
<td class="label">総ラック&#x1f340;:</td>
<td class="stat" id="rewardTotal"></td>
</tr>

<tr>
<td class="label">最高ハマり&#x1f422;:</td>
<td class="stat" id="max"></td>
</tr>

<tr>
<td class="label">EX出現確率:</td>
<td class="stat percent" id="rate"></td>
</tr>

</div>

<div id="editPanel">

<div class="editGrid">

<h3>&#x1f235; EDit &#x1f338;</h3>

<p>
現在周回<br>
<input id="editCurrent" type="number" min="0">
</p>

<p>
総周回<br>
<input id="editNormal" type="number" min="0">
</p>

<p>
総EX出現<br>
<input id="editExtra" type="number" min="0">
</p>

<p>
総ラック<br>
<input id="editReward" type="number" min="0">
</p>

<p>
最高ハマり<br>
<input id="editMax" type="number" min="0">
</p>

</div>

<button class="subButton" onclick="saveEdit()">Save&#x1f4dd;</button>
<button class="subButton" onclick="cancelEdit()">Cancel&#x274e;</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("stageTracker")) || {

normalClears:0,
extraAppearances:0,
extraRewards:0,

currentStreak:0,
maxStreak:0

}

function flashScreen(){
document.body.classList.add("flash")

setTimeout(()=>{
document.body.classList.remove("flash")
},250)
}

function save(){
localStorage.setItem("stageTracker",JSON.stringify(data))
update()
}

function normal(){

data.normalClears++
data.currentStreak++

save()
flashScreen()

}

function extra(){

data.extraAppearances++

if(data.currentStreak > data.maxStreak){
data.maxStreak = data.currentStreak
}

let cleared = confirm("勝ったかめか？(負けたら[キャンセル]かめね)")

if(cleared){

let reward = prompt("ドロップ亀は？")

if(reward){
data.extraRewards += Number(reward)
}

}

data.currentStreak = 0

save()

}

function update(){

normalTotal.textContent = data.normalClears
extraTotal.textContent = data.extraAppearances
rewardTotal.textContent = data.extraRewards

current.textContent = data.currentStreak
max.textContent = data.maxStreak

let rate = 0

if(data.normalClears > 0){
rate = (data.extraAppearances / data.normalClears * 100).toFixed(2)
}

rate = rate

document.getElementById("rate").textContent = rate

}

function openEdit(){

editPanel.style.display = "block"

editNormal.value = data.normalClears
editExtra.value = data.extraAppearances
editReward.value = data.extraRewards
editCurrent.value = data.currentStreak
editMax.value = data.maxStreak

}

function cancelEdit(){

editPanel.style.display = "none"

}

function validate(d){

if(d.extraAppearances > d.normalClears)
return "EX出現が周回数を超えてるかめね"

if(d.currentStreak > d.normalClears)
return "現在ハマりが周回数を超えてるかめね"

if(d.maxStreak < d.currentStreak)
return "最高ハマりは現在ハマり以上かめね"

if(d.extraRewards < 0)
return "総ラックは0以上かめね"

return null

}

function saveEdit(){

let newData = {

normalClears:Number(editNormal.value),
extraAppearances:Number(editExtra.value),
extraRewards:Number(editReward.value),
currentStreak:Number(editCurrent.value),
maxStreak:Number(editMax.value)

}

let error = validate(newData)

if(error){
alert(error)
return
}

data = newData

save()

editPanel.style.display = "none"

}

update()

</script>

</body>
</html>
