<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>EX MAS-turtle</title>

  <meta name="description" content="EXの出現回数を数えるかめね">
  <meta property="og:type" content="website">

  <style>
    /* ── Reset & Base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      touch-action: manipulation;
      /* Disables double-tap to zoom */
      -webkit-user-select: none;
      /* Prevents text selection on rapid tapping */
      user-select: none;
    }

    :root {
      --bg: #f2f2f7;
      --card: #fff;
      --separator: rgba(60, 60, 67, .12);
      --label-primary: rgba(0, 0, 0, .85);
      --label-secondary: rgba(60, 60, 67, .6);
      --tint: #007aff;
      --green: #34c759;
      --red: #ff3b30;
      /* -- Apple Colors -- */
      --sys-red: #ff3b30;
      --sys-purple: #af52de;
      --sys-green: #34c759;
      --sys-yellow: #ffcc00;
      --sys-blue: #007aff;
      --sys-gray: #8e8e93;
      --bg-red: rgba(255, 59, 48, 0.08);
      --bg-purple: rgba(175, 82, 222, 0.08);
      --bg-green: rgba(52, 199, 89, 0.08);
      --bg-yellow: rgba(255, 204, 0, 0.12);
      --bg-blue: rgba(0, 122, 255, 0.08);
      --bg-gray: rgba(142, 142, 147, 0.08);
      --radius: 14px;
      --card-shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 1px 2px rgba(0, 0, 0, .04);
    }

    html {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--label-primary);
    }

    body {
      min-height: 100dvh;
      padding: 0;
      margin: 0;
    }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100%;
      background: rgba(255, 255, 255, .82);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      z-index: 1000;
      padding: 68px 0 32px;
      transform: translateX(-280px);
      transition: transform .35s cubic-bezier(.32, .72, 0, 1), background-color .3s, border-color .3s;
      overflow-y: auto;
      border-right: 1px solid var(--separator);
    }

    #sidebar.open {
      transform: translateX(0);
    }

    .sidebarGroup {
      margin-bottom: 6px;
    }

    .sidebarGroupTitle {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--label-secondary);
      padding: 20px 20px 6px;
      cursor: default;
    }

    /* make collapsible title clickable */
    .sidebarGroupTitle[onclick] {
      cursor: pointer;
    }

    .sidebarGroupContent {
      max-height: 500px;
      transition: max-height .35s cubic-bezier(.32, .72, 0, 1), opacity .3s;
      overflow: hidden;
      opacity: 1;
    }

    .sidebarGroupContent.collapsed {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    #sidebar .stageBtn {
      display: flex;
      align-items: center;
      width: calc(100% - 16px);
      text-align: left;
      background: none;
      border: none;
      padding: 11px 20px;
      font-size: 15px;
      font-family: inherit;
      color: var(--label-primary);
      cursor: pointer;
      border-radius: 10px;
      margin: 1px 8px;
      transition: all .2s;
    }

    #sidebar .stageBtn:hover {
      background: rgba(0, 0, 0, .04);
    }

    #sidebar .stageBtn:active {
      background: rgba(0, 0, 0, .08);
      transform: scale(0.98);
    }

    #sidebar .stageBtn.active {
      background: var(--stage-bg);
      color: var(--label-primary);
      font-weight: 600;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    /* ── Hamburger / Toggle ── */
    #toggleSidebarBtn {
      position: fixed;
      left: 16px;
      top: 16px;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, .72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border: 1px solid var(--separator);
      border-radius: 10px;
      z-index: 1100;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }

    #toggleSidebarBtn:hover {
      background: rgba(255, 255, 255, .92);
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hamburger-line {
      width: 18px;
      height: 2px;
      background: var(--tint);
      border-radius: 2px;
      transition: all .3s cubic-bezier(.32, .72, 0, 1);
      transform-origin: center;
    }

    #toggleSidebarBtn.active .hamburger-line.middle {
      transform: scaleX(0);
      opacity: 0;
    }

    #toggleSidebarBtn.active .hamburger-line.top {
      transform: translateY(6px) rotate(45deg);
    }

    #toggleSidebarBtn.active .hamburger-line.bottom {
      transform: translateY(-6px) rotate(-45deg);
    }

    /* ── Overlay when sidebar is open ── */
    #sidebarOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .18);
      z-index: 999;
      transition: opacity .35s;
    }

    #sidebarOverlay.show {
      display: block;
    }

    /* ── Main Content ── */
    .mainContent {
      max-width: 420px;
      margin: 0 auto;
      padding: 72px 20px 40px;
    }

    /* ── Stage Title ── */
    #stageTitle {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: -.02em;
    }

    /* ── Button Group ── */
    .buttonGroup {
      margin-bottom: 20px;
      text-align: center;
    }

    .mainButtons {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }

    .mainButton {
      flex: 1;
      font-size: 22px;
      font-weight: 700;
      font-family: inherit;
      padding: 18px 0;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
      color: #fff;
      letter-spacing: -.01em;
    }

    .mainButton:first-child {
      background: linear-gradient(135deg, #34c759, #30b350);
      box-shadow: 0 2px 12px rgba(52, 199, 89, .35);
    }

    .mainButton:last-child {
      background: linear-gradient(135deg, #ff6b6b, #ff3b30);
      box-shadow: 0 2px 12px rgba(255, 59, 48, .30);
    }

    .mainButton:active {
      transform: scale(.96);
    }

    .subButton {
      font-size: 13px;
      font-family: inherit;
      font-style: normal;
      background: none;
      border: none;
      color: var(--tint);
      cursor: pointer;
      padding: 6px 12px;
      font-weight: 500;
      transition: opacity .15s;
    }

    .subButton:hover {
      opacity: .7;
    }

    /* ── Stats Card ── */
    .panel {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .stats {
      width: 100%;
      border-collapse: collapse;
    }

    .stats tr:not(:last-child) td {
      border-bottom: 1px solid var(--separator);
    }

    .stats td {
      padding: 13px 18px;
    }

    .label {
      font-size: 15px;
      color: var(--label-secondary);
      text-align: left;
    }

    .stat {
      font-size: 20px;
      font-weight: 600;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--label-primary);
    }

    .percent::after {
      content: "%";
      margin-left: 1px;
      font-size: .75em;
      color: var(--label-secondary);
    }

    /* ── Edit Panel ── */
    #editPanel {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 24px 20px 20px;
      margin-top: 16px;
    }

    #editPanel h3 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    .editGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .editGrid p {
      font-size: 13px;
      color: var(--label-secondary);
      font-weight: 500;
    }

    .editGrid input {
      display: block;
      width: 100%;
      margin-top: 5px;
      padding: 10px 12px;
      font-size: 16px;
      font-family: inherit;
      border: 1px solid var(--separator);
      border-radius: 10px;
      background: var(--bg);
      color: var(--label-primary);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .editGrid input:focus {
      border-color: var(--tint);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, .15);
    }

    /* Allow selection inside inputs */
    input {
      -webkit-user-select: auto;
      user-select: auto;
    }

    .editActions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .editActions .subButton {
      flex: 1;
      padding: 11px 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
    }

    .editActions .subButton:first-child {
      background: var(--tint);
      color: #fff;
    }

    .editActions .subButton:last-child {
      background: var(--bg);
      color: var(--label-secondary);
    }

    /* ── Flash Animations ── */
    @keyframes flash {
      0% {
        background-color: var(--bg)
      }

      50% {
        background-color: rgba(52, 199, 89, .18)
      }

      100% {
        background-color: var(--bg)
      }
    }

    @keyframes flashRed {
      0% {
        background-color: var(--bg)
      }

      50% {
        background-color: rgba(255, 59, 48, .15)
      }

      100% {
        background-color: var(--bg)
      }
    }

    .flash {
      animation: flash .25s ease
    }

    .flashRed {
      animation: flashRed .25s ease
    }

    /* ── Dark Mode Overrides ── */
    html.dark {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --separator: rgba(255, 255, 255, .12);
      --label-primary: rgba(255, 255, 255, .85);
      --label-secondary: rgba(235, 235, 245, .6);
      --card-shadow: 0 1px 3px rgba(0, 0, 0, .24), 0 1px 2px rgba(0, 0, 0, .16);
      --sys-red: #ff453a;
      --sys-purple: #bf5af2;
      --sys-green: #30d158;
      --sys-yellow: #ffd60a;
      --sys-blue: #0a84ff;
      --sys-gray: #98989d;
      --bg-red: rgba(255, 69, 58, 0.15);
      --bg-purple: rgba(191, 90, 242, 0.15);
      --bg-green: rgba(48, 209, 88, 0.15);
      --bg-yellow: rgba(255, 214, 10, 0.15);
      --bg-blue: rgba(10, 132, 255, 0.15);
      --bg-gray: rgba(152, 152, 157, 0.15);
    }

    html.dark #sidebar {
      background: rgba(44, 44, 46, .88);
    }

    html.dark #toggleSidebarBtn {
      background: rgba(44, 44, 46, .72);
    }

    html.dark #toggleSidebarBtn:hover {
      background: rgba(58, 58, 60, .92);
    }

    html.dark #sidebarOverlay {
      background: rgba(0, 0, 0, .45);
    }

    html.dark #sidebar .stageBtn:hover {
      background: rgba(255, 255, 255, .06);
    }

    html.dark #sidebar .stageBtn:active {
      background: rgba(255, 255, 255, .1);
    }

    html.dark .editGrid input {
      border-color: rgba(255, 255, 255, .15);
    }

    /* ── Danger (destructive action) ── */
    .danger {
      color: var(--red) !important;
    }

    /* ── Dark Mode Toggle ── */
    .darkModeRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--separator);
      margin-top: auto;
    }

    .darkModeLabel {
      font-size: 15px;
      color: var(--label-primary);
    }

    .toggle {
      position: relative;
      width: 51px;
      height: 31px;
      background: rgba(120, 120, 128, .32);
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: background .3s;
      padding: 0;
      flex-shrink: 0;
    }

    .toggle.on {
      background: var(--green);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 27px;
      height: 27px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .2);
      transition: transform .3s cubic-bezier(.32, .72, 0, 1);
    }

    .toggle.on::after {
      transform: translateX(20px);
    }

    /* ── Theme Transition ── */
    html,
    .panel,
    #toggleSidebarBtn,
    .editGrid input {
      transition: background-color .3s, color .3s, border-color .3s, box-shadow .3s;
    }
  </style>

  <script>
    // Prevent flash of wrong theme on load
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>

<body>

  <button id="toggleSidebarBtn" onclick="toggleSidebar()">
    <span class="hamburger">
      <span class="hamburger-line top"></span>
      <span class="hamburger-line middle"></span>
      <span class="hamburger-line bottom"></span>
    </span>
  </button>
  <div id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div id="sidebar">
    <div class="sidebarGroup">
      <div class="sidebarGroupTitle">天魔の孤城</div>
      <button class="stageBtn" id="stageBtn0" onclick="selectStage(0)">アーキレット</button>
      <button class="stageBtn" id="stageBtn1" onclick="selectStage(1)">コルティーナ</button>
    </div>
    <div class="sidebarGroup">
      <div class="sidebarGroupTitle">破界の星墓</div>
      <button class="stageBtn" id="stageBtn2" onclick="selectStage(2)">アムネディア</button>
      <button class="stageBtn" id="stageBtn10" onclick="selectStage(10)">インゼムニア</button>
    </div>
    <div class="sidebarGroup">
      <div class="sidebarGroupTitle" onclick="toggleGroup(this)">禁忌の獄(展開▼)</div>
      <div class="sidebarGroupContent collapsed">
        <button class="stageBtn" id="stageBtn4" onclick="selectStage(4)">刹那</button>
        <button class="stageBtn" id="stageBtn5" onclick="selectStage(5)">那由多</button>
        <button class="stageBtn" id="stageBtn6" onclick="selectStage(6)">阿頼耶</button>
        <button class="stageBtn" id="stageBtn7" onclick="selectStage(7)">無量大数</button>
        <button class="stageBtn" id="stageBtn8" onclick="selectStage(8)">涅槃寂静</button>
        <button class="stageBtn" id="stageBtn9" onclick="selectStage(9)">不可思議</button>
      </div>
    </div>
    <div class="sidebarGroup">
      <div class="sidebarGroupTitle">その他</div>
      <button class="stageBtn" id="stageBtn3" onclick="selectStage(3)">自由枠</button>
    </div>
    <div class="darkModeRow">
      <span class="darkModeLabel">ダークモード</span>
      <button class="toggle" id="darkToggle" onclick="toggleDarkMode()"></button>
    </div>
    <button class="stageBtn danger"
      onclick="if(confirm('全てのデータをリセットするかめか？')){localStorage.removeItem('stageTrackerAll'); localStorage.removeItem('stageIndex'); location.reload();}">初期化</button>
  </div>

  <div class="mainContent" id="mainContent">

    <h2 id="stageTitle">&#x1f422;EX MAS-turtle&#x1f54a;</h2>

    <div class="buttonGroup">
      <div class="mainButtons">
        <button class="mainButton" onclick="normal()">+1&#x1f422;</button>
        <button class="mainButton" onclick="extra()">EX&#x1f54a;</button>
      </div>
      <button class="subButton" onclick="openEdit()">EDit&#x270f;</button>
    </div>

    <div class="panel">
      <table class="stats">
        <tr>
          <td class="label">現在周回&#x1f422;</td>
          <td class="stat" id="current"></td>
        </tr>
        <tr>
          <td class="label">総周回&#x1f422;</td>
          <td class="stat" id="normalTotal"></td>
        </tr>
        <tr>
          <td class="label">EX出現&#x1f54a;</td>
          <td class="stat" id="extraTotal"></td>
        </tr>
        <tr>
          <td class="label">ラック&#x1f340;</td>
          <td class="stat" id="rewardTotal"></td>
        </tr>
        <tr>
          <td class="label">最高ハマり&#x1f422;</td>
          <td class="stat" id="max"></td>
        </tr>
        <tr>
          <td class="label">EX出現率&#x1f54a;</td>
          <td class="stat percent" id="rate"></td>
        </tr>
      </table>
    </div>

    <div id="editPanel">

      <h3>データ編集</h3>

      <div class="editGrid">

        <p>
          現在周回<br>
          <input id="editCurrent" type="number" min="0">
        </p>

        <p>
          総周回<br>
          <input id="editNormal" type="number" min="0">
        </p>

        <p>
          EX出現<br>
          <input id="editExtra" type="number" min="0">
        </p>

        <p>
          ラック<br>
          <input id="editReward" type="number" min="0">
        </p>

        <p>
          最高ハマり<br>
          <input id="editMax" type="number" min="0">
        </p>

      </div>

      <div class="editActions">
        <button class="subButton" onclick="saveEdit()">保存</button>
        <button class="subButton" onclick="cancelEdit()">キャンセル</button>
      </div>

    </div>
  </div>

  <script>
    const STAGE_COUNT = 11;
    const STAGE_CONFIG = [
      { name: "アーキレット", color: "var(--sys-red)", bg: "var(--bg-red)" },
      { name: "コルティーナ", color: "var(--sys-purple)", bg: "var(--bg-purple)" },
      { name: "アムネディア", color: "var(--sys-green)", bg: "var(--bg-green)" },
      { name: "その他", color: "var(--sys-gray)", bg: "var(--bg-gray)" },
      { name: "刹那", color: "var(--sys-yellow)", bg: "var(--bg-yellow)" },
      { name: "那由多", color: "var(--sys-purple)", bg: "var(--bg-purple)" },
      { name: "阿頼耶", color: "var(--sys-blue)", bg: "var(--bg-blue)" },
      { name: "無量大数", color: "var(--sys-red)", bg: "var(--bg-red)" },
      { name: "涅槃寂静", color: "var(--sys-green)", bg: "var(--bg-green)" },
      { name: "不可思議", color: "var(--sys-yellow)", bg: "var(--bg-yellow)" },
      { name: "インゼムニア", color: "var(--sys-yellow)", bg: "var(--bg-yellow)" }
    ];
    let stageIndex = Number(localStorage.getItem("stageIndex")) || 0;

    let allData = JSON.parse(localStorage.getItem("stageTrackerAll")) || [
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
      { normalClears: 0, extraAppearances: 0, extraRewards: 0, currentStreak: 0, maxStreak: 0 },
    ];

    while (allData.length < STAGE_COUNT) {
      allData.push({
        normalClears: 0,
        extraAppearances: 0,
        extraRewards: 0,
        currentStreak: 0,
        maxStreak: 0
      });
    }

    function saveAll() {
      localStorage.setItem("stageTrackerAll", JSON.stringify(allData));
      localStorage.setItem("stageIndex", stageIndex);
    }

    function getData() {
      return allData[stageIndex];
    }

    function setData(d) {
      allData[stageIndex] = d;
      saveAll();
    }

    function flashScreen(color = "flash") {
      const el = document.body;
      el.classList.remove("flash", "flashRed");
      void el.offsetWidth; // Force reflow to restart animation
      el.classList.add(color);
      el.addEventListener("animationend", function cleanup() {
        el.classList.remove(color);
        el.removeEventListener("animationend", cleanup);
      });
    }

    function save() {
      setData(getData());
      update();
    }

    function normal() {
      let data = getData();
      data.normalClears++;
      data.currentStreak++;
      if (data.currentStreak > data.maxStreak) {
        data.maxStreak = data.currentStreak;
      }
      save();
      flashScreen("flash");
    }

    function extra() {
      let data = getData();

      let reward;
      while (true) {
        reward = prompt("ドロップ数を入力するかめね、負けたらそのまま「OK」かめね");
        if (reward === null) {
          break;
        }
        if (reward.trim().length === 0) {
          data.extraRewards += 0;
          break;
        }
        const n = Number(reward);
        if (!Number.isFinite(n) || n < 0) {
          alert("0以上の数字を入力するかめね");
          continue;
        }
        data.extraRewards += Math.floor(n);
        break;
      }

      if (reward !== null) {
        data.extraAppearances++;
        if (data.currentStreak > data.maxStreak) {
          data.maxStreak = data.currentStreak;
        }
        data.currentStreak = 0;
        save();
        setTimeout(() => flashScreen("flashRed"), 50);
      }
    }

    function update() {
      let data = getData();
      document.getElementById("normalTotal").textContent = data.normalClears;
      document.getElementById("extraTotal").textContent = data.extraAppearances;
      document.getElementById("rewardTotal").textContent = data.extraRewards;
      document.getElementById("current").textContent = data.currentStreak;
      document.getElementById("max").textContent = data.maxStreak;
      let rate = 0;
      if (data.normalClears > 0) {
        rate = (data.extraAppearances / data.normalClears * 100).toFixed(2);
      }
      document.getElementById("rate").textContent = rate;
      let conf = STAGE_CONFIG[stageIndex];
      document.getElementById("stageTitle").innerHTML = `<span class="status-dot" style="background: ${conf.color}"></span>${conf.name}`;
      for (let i = 0; i < STAGE_COUNT; i++) {
        let btn = document.getElementById(`stageBtn${i}`);
        if (btn) btn.classList.toggle("active", i === stageIndex);
      }
    }

    function openEdit() {
      if (editPanel.style.display === "block") {
        editPanel.style.display = "none";
        return;
      }
      let data = getData();
      editPanel.style.display = "block";
      editNormal.value = data.normalClears;
      editExtra.value = data.extraAppearances;
      editReward.value = data.extraRewards;
      editCurrent.value = data.currentStreak;
      editMax.value = data.maxStreak;
    }

    function cancelEdit() {
      editPanel.style.display = "none";
    }

    function validate(d) {
      if (d.extraAppearances > d.normalClears)
        return "EX出現が総周回を超えてるかめね";
      if (d.currentStreak > d.normalClears)
        return "現在周回が総周回を超えてるかめね";
      if (d.extraRewards < 0)
        return "ラックは0以上かめね";
      return null;
    }

    function saveEdit() {
      let newData = {
        normalClears: Number(editNormal.value),
        extraAppearances: Number(editExtra.value),
        extraRewards: Number(editReward.value),
        currentStreak: Number(editCurrent.value),
        maxStreak: Number(editMax.value)
      }
      let error = validate(newData);
      if (error) {
        alert(error);
        return;
      }
      setData(newData);
      editPanel.style.display = "none";
      update();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const btn = document.getElementById("toggleSidebarBtn");
      const overlay = document.getElementById("sidebarOverlay");
      sidebar.classList.toggle("open");
      btn.classList.toggle("active");
      overlay.classList.toggle("show");
      const isOpen = sidebar.classList.contains("open");
      document.body.style.overflow = isOpen ? "hidden" : "";
      if (isOpen) {
        cancelEdit();
      }
    }

    function selectStage(idx) {
      stageIndex = idx;
      saveAll();
      toggleSidebar();
      update();
    }

    function toggleGroup(titleElem) {
      const content = titleElem.nextElementSibling;
      content.classList.toggle('collapsed');
    }

    function toggleDarkMode() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('darkToggle').classList.toggle('on', isDark);
    }

    window.addEventListener("DOMContentLoaded", () => {
      // Sync toggle button state with saved preference
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('darkToggle').classList.toggle('on', isDark);

      for (let i = 0; i < STAGE_COUNT; i++) {
        let btn = document.getElementById(`stageBtn${i}`);
        if (btn) {
          let conf = STAGE_CONFIG[i];
          btn.innerHTML = `${conf.name}`;
          btn.style.setProperty('--stage-bg', conf.bg);
        }
      }

      for (let i = 0; i < allData.length; i++) {
        if (allData[i].currentStreak > allData[i].maxStreak) {
          allData[i].maxStreak = allData[i].currentStreak;
        }
      }
      saveAll();
      update();
    });
  </script>

</body>

</html>
